name: Host Deployer Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - 'releases/**'
      - 'main'
      - 'master'
    paths:
      - 'pkg/hostman/**.go'
      - 'pkg/baremetal/**.go'
      - 'cmd/host-deployer/**.go'
      - 'vendor/yunion.io/x/sqlchemy/**.go'
      - 'vendor/yunion.io/x/jsonutils/**.go'
jobs:
  build_host_deployer:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 8

    - uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Huawei Cloud SWR
      uses: docker/login-action@v2
      with:
        registry: swr.cn-north-4.myhuaweicloud.com
        username: ${{ secrets.SWR_USERNAME }}
        password: ${{ secrets.SWR_PASSWORD }}

    - name: Build And Push Docker Image
      shell: bash
      run: |
          set -o xtrace
          export GO111MODULE=on
          branch="${GITHUB_REF#refs/heads/}"
          timestamp=`TZ="Asia/Shanghai" date +"%Y%m%d%H%M%S"`
          export VERSION="$branch-$timestamp-solo"
          export GOOS=linux
          export ARCH=amd64
          export BUILDX_NO_DEFAULT_ATTESTATIONS=1
          export REGISTRY=swr.cn-north-4.myhuaweicloud.com/iiecas-ziheng
          make image host-deployer
